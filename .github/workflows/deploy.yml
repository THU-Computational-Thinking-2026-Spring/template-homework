# 学生作业 CI：检查 public/ 目录并发布到 GitHub Pages
#
# 触发方式：
#   - 仅支持手动触发（workflow_dispatch）
#   - 开发期间学生本地使用 Live Server 预览，无需部署 Pages
#   - 截止日期后由助教通过 publish_after_deadline.py 脚本批量触发此 workflow
#
# 注意：私有仓库 Pages 需要 GitHub Team 及以上计划（助教在截止后升级计划再触发）

name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一次部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          set -e
          echo "Publishing public/ to GitHub Pages..."
          if [ ! -f public/index.html ]; then
            echo "ERROR: public/index.html does not exist. Please put your files under public/."
            exit 1
          fi
          if [ ! -f metadata.json ]; then
            echo "ERROR: metadata.json does not exist. Please fill in the template in the repo root."
            exit 1
          fi
          echo "Checks passed."

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deployment
        uses: actions/deploy-pages@v4
