# 学生提交后自动触发门户重建
# 通过向门户仓库发送 repository_dispatch 事件实现
#
# 前置：助教需在 GitHub Organization Settings → Secrets 中设置
#   PORTAL_DISPATCH_TOKEN = 一个有门户仓库 Actions 写权限的 PAT
# 助教脚本 bulk_invite_webhook.py 会自动完成此配置

name: Notify Portal

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to portal
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.PORTAL_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/THU-Computational-Thinking-2026-Spring/THU-Computational-Thinking-2026-Spring.github.io/dispatches \
            -d '{"event_type":"student-push"}' \
          || echo "[warn] dispatch failed (token may not be configured yet)"
