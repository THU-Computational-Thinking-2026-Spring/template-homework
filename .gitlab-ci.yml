# 学生作业 CI：把 public/ 目录发布到 GitLab Pages
# 基于官方模板 https://gitlab.com/pages/plain-html
image: busybox

pages:
  stage: deploy
  script:
    - |
      set -e
      echo "Publishing public/ to GitLab Pages..."
      if [ ! -f public/index.html ]; then
        echo "ERROR: public/index.html does not exist. Please put your files under public/."
        exit 1
      fi
      if [ ! -f metadata.json ]; then
        echo "ERROR: metadata.json does not exist. Please fill in the template in the repo root."
        exit 1
      fi
      echo "Checks passed."
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
