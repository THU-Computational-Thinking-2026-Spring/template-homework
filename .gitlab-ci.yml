# 学生作业 CI：仅把 public/ 目录发布到 GitLab Pages
# 基于官方模板 https://gitlab.com/pages/plain-html
image: busybox

pages:
  stage: deploy
  script:
    - echo "Publishing public/ to GitLab Pages..."
    - test -f public/index.html || (echo "ERROR: public/index.html 不存在，请把作业文件放到 public/ 下" && exit 1)
    - test -f metadata.json || (echo "ERROR: metadata.json 不存在，请参考 README 填写" && exit 1)
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
